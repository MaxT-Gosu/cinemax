<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://pl29068762.profitablecpmratenetwork.com/4f/f8/45/4ff845d693e73abd6a8c4f87d8a82013.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Película - Cinemax</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* Mantenemos tus estilos originales de Cinemax */
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --text-color-sec: #b3b3b3; 
            --skeleton-bg: #222222; 
        }
        body { margin: 0; background: var(--bg-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: var(--text-color); padding-bottom: 100px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
        
        .hero { position: relative; width: 100%; height: 70vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px; box-sizing: border-box; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg-color) 10%, transparent 90%); }
        .hero-content { position: relative; z-index: 2; max-width: 600px; }
        .hero h1 { font-size: 3rem; margin: 0 0 10px 0; font-weight: bold; }
        
        .play-btn { background: white; color: black; border: none; padding: 12px 30px; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        .play-btn:hover { background: rgba(255,255,255,0.8); }

        /* Estilos del contenedor del Reproductor */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
        }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 10001; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .video-js { width: 100% !important; height: 100% !important; }

        .info-section { padding: 40px; display: grid; grid-template-columns: 1fr 300px; gap: 40px; }
        .metadata { color: #46d369; font-weight: bold; margin-bottom: 20px; display: flex; gap: 15px; }
        .desc { font-size: 1.1rem; line-height: 1.6; color: var(--text-color-sec); }
        .tags { margin-top: 20px; font-size: 0.9rem; color: #808080; }

        .recomendados { padding: 0 40px; }
        .grid-recomendados { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .card-item { cursor: pointer; transition: 0.3s; }
        .card-item img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="detalle-content">
        <div id="hero-bg" class="hero">
            <div class="hero-content">
                <h1 id="peli-titulo">Cargando...</h1>
                <div class="metadata">
                    <span id="peli-coincidencia"></span>
                    <span id="peli-fecha"></span>
                    <span style="border: 1px solid #808080; padding: 0 5px; color: white;" id="peli-calidad"></span>
                </div>
                <button class="play-btn" onclick="playVideo()"><i class="fas fa-play"></i> Reproducir</button>
            </div>
        </div>

        <div class="info-section">
            <div>
                <p class="desc" id="peli-desc"></p>
                <div class="tags" id="peli-tags"></div>
            </div>
        </div>

        <div class="recomendados">
            <h3>Más títulos similares</h3>
            <div id="grid-recomendados" class="grid-recomendados"></div>
        </div>
    </div>

    <div id="player-overlay">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <div id="video-container" style="width:100%; height:100%;">
            <video id="vjs-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
        </div>
        <iframe id="v-frame" style="display:none; width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://googleads.github.io/videojs-ima/dist/videojs.ima.js"></script>
    <script src="peliculas.js"></script>

    <script>
        const peliId = localStorage.getItem('peli_id');
        const peliReal = baseDeDatos.find(item => item.id === peliId);

        if (peliReal) {
            // Llenamos los datos de la peli (TU LÓGICA ORIGINAL)
            document.getElementById('peli-titulo').innerText = peliReal.titulo;
            document.getElementById('peli-desc').innerText = peliReal.descripcion;
            document.getElementById('peli-fecha').innerText = peliReal.fecha;
            document.getElementById('peli-tags').innerText = "Géneros: " + peliReal.tags;
            document.getElementById('peli-coincidencia').innerText = peliReal.coincidencia;
            document.getElementById('peli-calidad').innerText = peliReal.calidad;
            document.getElementById('hero-bg').style.backgroundImage = `url(${peliReal.bg})`;
        }

        // Configuración de Video.js e IMA
        var player = videojs('vjs-player');
        player.ima({
            adTagUrl: 'https://pubads.g.doubleclick.net/gampad/ads?sz=640x480&iu=/124319096/external/ad_rule_samples&ciu_szs=300x250&ad_rule=1&impl=s&gdfp_req=1&env=vp&output=vmap&unviewed_position_start=1&cust_params=deployment%3Ddevsite%26sample_ct%3Dlinearvmap&cmsid=496&vid=short_onecue&correlator='
        });

        function playVideo() {
            if(!peliReal || !peliReal.video) return alert("Video no disponible");

            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('v-frame');
            const videoDiv = document.getElementById('video-container');
            overlay.style.display = 'block';

            // Si el link es un embed (BurstCloud), usamos Iframe
            if (peliReal.video.includes('burstcloud') || peliReal.video.includes('embed')) {
                videoDiv.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = peliReal.video;
            } else {
                // Si es link directo, usamos el player con publicidad
                iframe.style.display = 'none';
                videoDiv.style.display = 'block';
                player.src({ src: peliReal.video, type: 'video/mp4' });
                player.play();
            }
        }

        function closePlayer() {
            player.pause();
            document.getElementById('v-frame').src = "";
            document.getElementById('player-overlay').style.display = 'none';
        }

        // Función de Recomendados (TU LÓGICA ORIGINAL)
        function cargarRecomendados() {
            let recomendaciones = baseDeDatos.filter(item => item.id !== peliId).sort(() => 0.5 - Math.random()).slice(0, 6);
            const grid = document.getElementById('grid-recomendados');
            recomendaciones.forEach(item => {
                const card = document.createElement("div");
                card.className = "card-item";
                card.onclick = () => { localStorage.setItem('peli_id', item.id); location.reload(); };
                card.innerHTML = `<img src="${item.poster}">`;
                grid.appendChild(card);
            });
        }
        cargarRecomendados();
    </script>
</body>
</html>
