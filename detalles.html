<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://pl29068762.profitablecpmratenetwork.com/4f/f8/45/4ff845d693e73abd6a8c4f87d8a82013.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Película - Cinemax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />

    <style>
        /* AQUÍ VA TODO TU CSS ORIGINAL SIN TOCAR UNA SOLA LÍNEA */
        :root { --bg-color: #141414; --bg-color-alt: #1a1a1a; --accent-color: #E50914; --text-color: #ffffff; --text-color-sec: #b3b3b3; --skeleton-bg: #222222; }
        body { margin: 0; background: var(--bg-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: var(--text-color); padding-bottom: 100px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;}
        .hero { position: relative; width: 100%; height: 55vh; background: #000; overflow: hidden; }
        #hero-bg { width: 100%; height: 100%; background-size: cover; background-position: center 20%; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-color) 0%, rgba(20,20,20,0.8) 20%, transparent 60%); }
        .skeleton { background: var(--bg-color-alt); background-image: linear-gradient(90deg, var(--bg-color-alt) 0px, var(--skeleton-bg) 40px, var(--bg-color-alt) 80px); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite linear; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .header-content { padding: 0 20px; margin-top: -80px; position: relative; z-index: 10; text-align: left; }
        h1 { font-size: 32px; margin: 0 0 10px 0; line-height: 1.1; text-shadow: 0 2px 10px rgba(0,0,0,0.8); font-family: 'Arial Narrow', sans-serif; font-weight: 900; letter-spacing: -0.5px;}
        .meta-row { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: bold; margin-bottom: 20px; color: var(--text-color-sec); }
        .match-text { color: #46d369; } 
        .hd-badge { border: 1px solid var(--text-color-sec); padding: 1px 4px; border-radius: 3px; font-size: 10px; letter-spacing: 1px; }
        .btn-play { flex: 1; background: #fff; color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .info-box { padding: 0 20px; font-size: 15px; line-height: 1.6; color: #fff; }
        .p-descripcion { color: #ddd; margin-bottom: 15px; display: block; }
        .recommended-section { margin: 30px 0; padding-left: 20px; }
        .scroll-row { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scrollbar-width: none; padding-right: 20px; }
        .card-item { flex-shrink: 0; cursor: pointer; width: 135px; }
        .img-wrapper { width: 100%; aspect-ratio: 2/3; border-radius: 6px; overflow: hidden; background: var(--skeleton-bg); position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        
        /* Estilos del reproductor (Añadidos) */
        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }
        .close-player { position: absolute; top: 30px; right: 20px; color: #fff; font-size: 35px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 40px; height: 40px; z-index: 5001; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<div class="hero">
    <div id="hero-skeleton" class="skeleton"></div>
    <div id="hero-bg"></div>
</div>

<div class="header-content">
    <h1 id="p-title">Cargando...</h1>
    <div class="meta-row">
        <span id="p-coincidencia" class="match-text"></span>
        <span id="p-fecha">---</span>
        <span id="p-etiqueta" style="color:var(--accent-color)"></span>
        <span id="p-calidad" class="hd-badge"></span>
    </div>
    <div style="display: flex; margin-bottom: 20px;">
        <button class="btn-play" onclick="playVideo()"><i class="fas fa-play"></i> Reproducir</button>
    </div>
</div>

<div class="info-box">
    <span id="p-descripcion" class="p-descripcion">Cargando sinopsis...</span>
    <p><span style="color:var(--text-color-sec); font-weight:bold;">Géneros:</span> <span id="p-tags">---</span></p>
</div>

<div class="recommended-section">
    <h2>También puedes ver:</h2>
    <div class="scroll-row" id="grid-recomendados"></div>
</div>

<div id="player-overlay">
    <button class="close-player" onclick="closePlayer()">&times;</button>
    
    <div id="video-container" style="display:none; width:100%; height:100%;">
        <video id="vjs-player" class="video-js vjs-default-skin" controls preload="auto"></video>
    </div>
    
    <iframe id="v-frame" style="display:none; width:100%; height:100%; border:none;" allowfullscreen></iframe>
</div>

<script src="peliculas.js"></script>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js" defer></script>
<script src="https://googleads.github.io/videojs-ima/dist/videojs.ima.js" defer></script>

<script>
    // 1. CARGA DE DATOS (Igual a tu original)
    const peliId = localStorage.getItem('peli_id');
    const peliReal = baseDeDatos.find(item => item.id === peliId);

    if(peliReal) {
        const finalBg = peliReal.bg || peliReal.poster;
        const imgLoader = new Image();
        imgLoader.src = finalBg;
        imgLoader.onload = () => {
            document.getElementById('hero-skeleton').style.display = 'none';
            document.getElementById('hero-bg').style.backgroundImage = "url('" + finalBg + "')";
            document.getElementById('hero-bg').style.opacity = '1'; 
        };
        document.getElementById('p-title').innerText = peliReal.titulo;
        document.getElementById('p-fecha').innerText = peliReal.fecha;
        document.getElementById('p-tags').innerText = peliReal.tags;
        document.getElementById('p-descripcion').innerText = peliReal.descripcion || "Sin descripción.";
        document.getElementById('p-coincidencia').innerText = peliReal.coincidencia || "";
        document.getElementById('p-calidad').innerText = peliReal.calidad || "";
    }

    // 2. FUNCIÓN DE RECOMENDADOS (Igual a tu original)
    function cargarRecomendados() {
        if (typeof baseDeDatos === 'undefined') return;
        let recomendaciones = baseDeDatos.filter(item => item.id !== peliId).sort(() => 0.5 - Math.random()).slice(0, 6);
        const grid = document.getElementById('grid-recomendados');
        recomendaciones.forEach(item => {
            const card = document.createElement("div");
            card.className = "card-item";
            card.onclick = () => { localStorage.setItem('peli_id', item.id); location.reload(); };
            card.innerHTML = `<div class="img-wrapper skeleton"><img src="${item.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')"></div>`;
            grid.appendChild(card);
        });
    }
    cargarRecomendados();

    // 3. LÓGICA DEL REPRODUCTOR (Mejorada para no bloquear)
    let playerInit = false;

    function playVideo() {
        if(!peliReal || !peliReal.video) return alert("Error");
        
        const overlay = document.getElementById('player-overlay');
        const frame = document.getElementById('v-frame');
        const videoDiv = document.getElementById('video-container');

        overlay.style.display = 'block';

        // Si es BURSTCLOUD: Usamos tu Iframe (Rápido y seguro)
        if (peliReal.video.includes('burstcloud') || peliReal.video.includes('embed')) {
            videoDiv.style.display = 'none';
            frame.style.display = 'block';
            frame.src = peliReal.video;
        } 
        // Si es LINK DIRECTO: Usamos Video.js con Publicidad
        else {
            frame.style.display = 'none';
            videoDiv.style.display = 'block';
            
            // Inicializar el reproductor solo la primera vez que se necesite
            const vjsPlayer = videojs('vjs-player');
            
            if(!playerInit) {
                vjsPlayer.ima({
                    adTagUrl: 'https://pubads.g.doubleclick.net/gampad/ads?sz=640x480&iu=/124319096/external/ad_rule_samples&ciu_szs=300x250&ad_rule=1&impl=s&gdfp_req=1&env=vp&output=vmap&unviewed_position_start=1&cust_params=deployment%3Ddevsite%26sample_ct%3Dlinearvmap&cmsid=496&vid=short_onecue&correlator='
                });
                playerInit = true;
            }

            vjsPlayer.src({ src: peliReal.video, type: 'video/mp4' });
            vjsPlayer.play();
        }
    }

    function closePlayer() {
        const vjsPlayer = videojs('vjs-player');
        vjsPlayer.pause();
        document.getElementById('v-frame').src = "";
        document.getElementById('player-overlay').style.display = 'none';
    }
</script>

</body>
</html>
