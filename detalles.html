<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://pl29068762.profitablecpmratenetwork.com/4f/f8/45/4ff845d693e73abd6a8c4f87d8a82013.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Película - Cinemax</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-color: #141414; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
        }
        body { margin: 0; background: var(--bg-color); font-family: Arial, sans-serif; color: var(--text-color); }
        
        /* Contenedor del reproductor */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
        }
        .close-btn {
            position: absolute; top: 20px; right: 20px;
            font-size: 30px; color: white; cursor: pointer; z-index: 10001;
        }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* Estilos de tu diseño original (simplificados para el ejemplo) */
        .hero { position: relative; width: 100%; height: 60vh; background-size: cover; background-position: center; }
        .play-btn { background: var(--accent-color); color: white; padding: 12px 24px; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; margin: 20px; }
    </style>
</head>
<body>

    <div id="detalle-content">
        <div id="hero-bg" class="hero"></div>
        <button class="play-btn" onclick="playVideo()"><i class="fas fa-play"></i> Reproducir</button>
    </div>

    <div id="player-overlay">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        
        <div id="video-container" style="width:100%; height:100%;">
            <video id="vjs-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
        </div>

        <iframe id="v-frame" style="display:none; width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script src="https://googleads.github.io/videojs-ima/dist/videojs.ima.js"></script>
    <script src="peliculas.js"></script>

    <script>
        const peliId = localStorage.getItem('peli_id');
        const peliReal = baseDeDatos.find(item => item.id === peliId);
        
        // Inicializar Video.js
        var player = videojs('vjs-player');

        // CONFIGURACIÓN DE LA PUBLICIDAD (VAST)
        // He puesto un link de prueba de Google. Aquí pondrás el de tu red de anuncios.
        var adTagUrl = 'https://pubads.g.doubleclick.net/gampad/ads?sz=640x480&iu=/124319096/external/ad_rule_samples&ciu_szs=300x250&ad_rule=1&impl=s&gdfp_req=1&env=vp&output=vmap&unviewed_position_start=1&cust_params=deployment%3Ddevsite%26sample_ct%3Dlinearvmap&cmsid=496&vid=short_onecue&correlator=';

        player.ima({
            adTagUrl: adTagUrl
        });

        function playVideo() {
            if(!peliReal || !peliReal.video) return alert("Error al cargar video");

            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('v-frame');
            const videoDiv = document.getElementById('video-container');

            overlay.style.display = 'block';

            // LÓGICA DE DETECCIÓN:
            // Si el link contiene "burstcloud", usamos el iframe (con anuncios de ellos)
            if (peliReal.video.includes('burstcloud') || peliReal.video.includes('embed')) {
                videoDiv.style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = peliReal.video;
            } 
            // Si es un link directo (.mp4, .m3u8 o de tu servidor CDN), usamos Video.js con TUS anuncios
            else {
                iframe.style.display = 'none';
                videoDiv.style.display = 'block';
                player.src({ src: peliReal.video, type: 'video/mp4' });
                player.play();
            }
        }

        function closePlayer() {
            player.pause();
            document.getElementById('v-frame').src = "";
            document.getElementById('player-overlay').style.display = 'none';
        }

        // (Aquí iría el resto de tu código para cargar posters, descripción, etc.)
        document.getElementById('hero-bg').style.backgroundImage = `url(${peliReal.bg})`;
    </script>
</body>
</html>
