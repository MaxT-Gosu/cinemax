            --bg-color: #141414;

        .action-buttons { display: flex; margin-bottom: 20px; }
        .btn-play { flex: 1; background: #fff; color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }

        .info-box { padding: 0 20px; font-size: 15px; line-height: 1.6; color: #fff; }
        .p-descripcion { color: #ddd; margin-bottom: 15px; display: block; }
        .text-gray { color: var(--text-color-sec); font-weight: bold; }

        .menu { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.03); z-index: 100; }

        /* REPRODUCTOR HÍBRIDO FIJO */
        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; }

<div id="player-overlay">
    <button class="close-player" onclick="closePlayer()">&times;</button>
    <div id="player-content">
        <video id="v-native" controls playsinline></video>
        <iframe id="v-frame" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

<script src="peliculas.js"></script>

<script>
    const peliId = localStorage.getItem('peli_id');
    const peliReal = baseDeDatos.find(item => item.id === peliId);

    window.onpopstate = function() {
        if (document.getElementById('player-overlay').style.display === 'block') {
            closePlayer();
        }
    };

    if(peliReal) {
        const finalBg = peliReal.bg || peliReal.poster;
        const heroBgElement = document.getElementById('hero-bg');
        const skeletonElement = document.getElementById('hero-skeleton');

        const imgLoader = new Image();
        imgLoader.src = finalBg;
        imgLoader.onload = () => {
            skeletonElement.style.display = 'none';
            heroBgElement.style.backgroundImage = "url('" + finalBg + "')";
            heroBgElement.style.opacity = '1'; 
        };
        
        document.getElementById('p-title').innerText = peliReal.titulo;
        document.getElementById('p-fecha').innerText = peliReal.fecha;
        document.getElementById('p-tags').innerText = peliReal.tags;
        document.getElementById('p-descripcion').innerText = peliReal.descripcion || "Sin descripción.";
        document.getElementById('p-coincidencia').innerText = peliReal.coincidencia || "98% de coincidencia";
    }

    function playVideo() {
        if(!peliReal || !peliReal.video) return alert("No disponible");
        
        const overlay = document.getElementById('player-overlay');
        const vNative = document.getElementById('v-native');
        const vFrame = document.getElementById('v-frame');
        const url = peliReal.video.toLowerCase();

        overlay.style.display = 'block';

        // DETECCIÓN SEGURA DE TIPO DE LINK
        if (url.includes('.mp4') || url.includes('bunny') || url.includes('b-cdn')) {
            // MODO BUNNY / MP4 (Reproductor Nativo)
            vFrame.style.display = 'none';
            vFrame.src = ""; 
            
            vNative.style.display = 'block';
            vNative.src = peliReal.video;
            vNative.play();
        } else {
            // MODO BURSTCLOUD / EMBED (Iframe)
            vNative.style.display = 'none';
            vNative.pause();
            vNative.src = ""; 
            
            vFrame.style.display = 'block';
            vFrame.src = peliReal.video;
        }

        history.pushState({playing: true}, "Reproduciendo");
    }

    function closePlayer() {
        const vNative = document.getElementById('v-native');
        const vFrame = document.getElementById('v-frame');
        
        vNative.pause();
        vNative.src = "";
        vFrame.src = ""; 
        
        document.getElementById('player-overlay').style.display = 'none';
    }

    function cargarRecomendados() {
        if (typeof baseDeDatos === 'undefined') return;
        let recomendaciones = baseDeDatos.filter(item => item.id !== peliId).sort(() => 0.5 - Math.random()).slice(0, 6);
        const grid = document.getElementById('grid-recomendados');
        recomendaciones.forEach(item => {
            const card = document.createElement("div");
            card.className = "card-item";
            card.onclick = () => { localStorage.setItem('peli_id', item.id); location.reload(); };
            card.innerHTML = `<div class="img-wrapper"><img src="${item.poster}" onload="this.style.opacity='1'"></div>`;
            grid.appendChild(card);
        });
    }
    cargarRecomendados();
</script>
