<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Serie - Cinemax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #141414; 
            --bg-color-alt: #1a1a1a; 
            --accent-color: #E50914; 
            --text-color: #ffffff;
            --text-color-sec: #b3b3b3; 
            --skeleton-bg: #222222; 
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- HEADER / HERO --- */
        .hero {
            position: relative;
            width: 100%;
            height: 60vh;
            background-size: cover;
            background-position: center;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-color) 5%, transparent 90%);
        }

        /* --- CONTENIDO --- */
        .content-container {
            padding: 20px;
            max-width: 1200px;
            margin: -100px auto 0 auto;
            position: relative;
            z-index: 2;
        }

        .serie-info h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .meta-data { color: var(--text-color-sec); margin-bottom: 20px; display: flex; gap: 15px; font-size: 0.9rem; }
        .meta-data span { border: 1px solid #555; padding: 2px 6px; border-radius: 4px; }
        .descripcion { line-height: 1.6; margin-bottom: 30px; max-width: 800px; color: #ddd; }

        /* --- SELECTOR DE TEMPORADAS --- */
        .selector-temporada {
            background: #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
            margin-bottom: 20px;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
        }

        /* --- LISTA EPISODIOS --- */
        .episodios-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }
        .episodio-card {
            background: var(--bg-color-alt);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            border-left: 4px solid transparent;
        }
        .episodio-card:hover {
            transform: scale(1.02);
            border-left-color: var(--accent-color);
        }
        .episodio-card h4 { margin: 0 0 5px 0; font-size: 1rem; }
        .episodio-card p { margin: 0; font-size: 0.85rem; color: var(--text-color-sec); }

        /* --- REPRODUCTOR OVERLAY --- */
        #player-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 2rem; color: white; cursor: pointer;
        }
        iframe {
            width: 90%;
            height: 80%;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- RECOMENDADOS --- */
        .grid-recomendados {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .card-item img { width: 100%; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .card-item img:hover { transform: scale(1.05); }

    </style>
</head>
<body>

    <div id="hero-bg" class="hero">
        <div class="hero-overlay"></div>
    </div>

    <div class="content-container">
        <div class="serie-info" id="info-principal">
            <h1 id="serie-titulo">Cargando...</h1>
            <div class="meta-data">
                <span id="serie-fecha">--</span>
                <span id="serie-calidad">--</span>
                <span id="serie-coincidencia">--</span>
            </div>
            <p class="descripcion" id="serie-descripcion"></p>
        </div>

        <h3>Temporadas</h3>
        <select id="season-selector" class="selector-temporada" onchange="cambiarTemporada(this.value)">
            </select>

        <h3>Episodios</h3>
        <div id="lista-episodios" class="episodios-container">
            </div>

        <h3>Más como esto</h3>
        <div id="grid-recomendados" class="grid-recomendados"></div>
    </div>

    <div id="player-overlay">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <iframe id="v-frame" src="" allowfullscreen></iframe>
    </div>

    <script src="series.js"></script>
    <script>
        const idBuscado = localStorage.getItem('peli_id');
        let serieActual = null;

        document.addEventListener("DOMContentLoaded", () => {
            if (!idBuscado) {
                window.location.href = "index.html";
                return;
            }

            serieActual = baseDeSeries.find(s => s.id === idBuscado);

            if (serieActual) {
                renderDetalles();
                renderTemporadas();
                cargarRecomendados();
            }
        });

        function renderDetalles() {
            document.getElementById('hero-bg').style.backgroundImage = `url(${serieActual.bg})`;
            document.getElementById('serie-titulo').innerText = serieActual.titulo;
            document.getElementById('serie-fecha').innerText = serieActual.fecha;
            document.getElementById('serie-calidad').innerText = serieActual.calidad;
            document.getElementById('serie-coincidencia').innerText = serieActual.coincidencia;
            document.getElementById('serie-descripcion').innerText = serieActual.descripcion;
        }

        function renderTemporadas() {
            const selector = document.getElementById('season-selector');
            selector.innerHTML = '';

            serieActual.temporadas.forEach(temp => {
                const opt = document.createElement('option');
                opt.value = temp.numero;
                opt.textContent = `Temporada ${temp.numero}`;
                selector.appendChild(opt);
            });

            // Cargar por defecto la primera temporada de la lista
            if (serieActual.temporadas.length > 0) {
                renderEpisodios(serieActual.temporadas[0].numero);
            }
        }

        function cambiarTemporada(numero) {
            renderEpisodios(parseInt(numero));
        }

        function renderEpisodios(numTemporada) {
            const contenedor = document.getElementById('lista-episodios');
            contenedor.innerHTML = '';

            const temporada = serieActual.temporadas.find(t => t.numero === numTemporada);

            if (temporada && temporada.episodios) {
                temporada.episodios.forEach(ep => {
                    const card = document.createElement('div');
                    card.className = 'episodio-card';
                    card.onclick = () => openPlayer(ep.video);
                    card.innerHTML = `
                        <h4>Episodio ${ep.ep}</h4>
                        <p>${ep.titulo || 'Sin título'}</p>
                    `;
                    contenedor.appendChild(card);
                });
            }
        }

        function openPlayer(url) {
            if (!url || url === "#") {
                alert("Episodio no disponible.");
                return;
            }
            const frame = document.getElementById('v-frame');
            frame.src = url;
            document.getElementById('player-overlay').style.display = 'flex';
        }

        function closePlayer() {
            const frame = document.getElementById('v-frame');
            frame.src = "";
            document.getElementById('player-overlay').style.display = 'none';
        }

        function cargarRecomendados() {
            const grid = document.getElementById('grid-recomendados');
            grid.innerHTML = '';

            const recomendaciones = baseDeSeries
                .filter(item => item.id !== idBuscado)
                .sort(() => 0.5 - Math.random())
                .slice(0, 6);

            recomendaciones.forEach(item => {
                const card = document.createElement("div");
                card.className = "card-item";
                card.onclick = () => {
                    localStorage.setItem('peli_id', item.id);
                    window.scrollTo(0, 0);
                    location.reload();
                };
                card.innerHTML = `<img src="${item.poster}" alt="${item.titulo}" loading="lazy">`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
